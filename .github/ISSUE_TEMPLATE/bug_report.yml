name: Bug report
description: Report a defect in the platform or a module
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug, including expected vs actual behavior.
    validations:
      required: true
  - type: input
    id: module
    attributes:
      label: Module / Phase
      placeholder: e.g., Module 1 ERP Sync Reconciliation / Phase 2
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
  - type: textarea
    id: logs
    attributes:
      label: Logs / traces
      render: shell
