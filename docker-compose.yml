services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://copilot:copilot@db:5432/copilot
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
